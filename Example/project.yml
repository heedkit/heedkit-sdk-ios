name: FeatureKitDemo
options:
  bundleIdPrefix: dev.featurekit.demo
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  FeatureKit:
    # Path is relative to this project.yml file -> Example/../ = the SDK root.
    path: ../

targets:
  FeatureKitDemo:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: FeatureKit Demo
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Allow http://localhost / http://127.0.0.1 while developing against the
        # local Rails API (the simulator reaches the Mac on either host).
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
            127.0.0.1:
              NSExceptionAllowsInsecureHTTPLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.featurekit.demo.FeatureKitDemo
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - package: FeatureKit
        product: FeatureKit
